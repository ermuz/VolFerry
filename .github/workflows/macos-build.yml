name: macOS Build

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build App
        run: |
          xcodebuild \
            -project "VolFerry.xcodeproj" \
            -scheme "VolFerry" \
            -configuration Release \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App
        run: |
          APP_PATH="$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Release/VolFerry.app" -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "VolFerry.app not found in DerivedData"
            exit 1
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            BUILD_LABEL="${GITHUB_REF_NAME}"
          else
            BUILD_LABEL="${GITHUB_REF_NAME}-$(git rev-parse --short=8 HEAD)"
          fi
          ZIP_NAME="VolFerry-${BUILD_LABEL}-macos.zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/${ZIP_NAME}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
