name: macOS Build

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build App
        run: |
          xcodebuild \
            -project "VolFerry.xcodeproj" \
            -scheme "VolFerry" \
            -configuration Release \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package App
        run: |
          APP_PATH="$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Release/VolFerry.app" -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "VolFerry.app not found in DerivedData"
            exit 1
          fi
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/VolFerry-macos.zip"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolFerry-macos
          path: dist/VolFerry-macos.zip
          if-no-files-found: error

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VolFerry-macos.zip
