name: Auto Tag

on:
  push:
    branches:
      - release/*

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create alpha tag from release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if git tag --points-at HEAD | sed '/^\s*$/d' | wc -l | tr -d ' ' | grep -qv '^0$'; then
            echo "Current commit already has tag(s), skip."
            exit 0
          fi

          BRANCH="${GITHUB_REF_NAME}"
          VERSION="$(echo "${BRANCH}" | sed -n 's|^release/\([0-9]\+\.[0-9]\+\.[0-9]\+\)$|\1|p')"
          if [ -z "${VERSION}" ]; then
            echo "Branch must match release/x.y.z. current=${BRANCH}"
            exit 1
          fi

          PREFIX="${VERSION}-alpha."
          LAST="$(git tag -l "${PREFIX}*" | sed -n "s/^${VERSION}-alpha\.\([0-9][0-9]*\)$/\1/p" | sort -n | tail -n 1)"
          if [ -z "${LAST}" ]; then
            NEXT=1
          else
            NEXT=$((LAST + 1))
          fi

          TAG="${VERSION}-alpha.${NEXT}"
          echo "Create tag: ${TAG}"

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
