name: Auto Tag

on:
  push:
    branches:
      - develop/*
      - release/*

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create pre-release tag from branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git tag --points-at HEAD | sed '/^\s*$/d' | wc -l | tr -d ' ' | grep -qv '^0$'; then
            echo "Current commit already has tag(s), skip."
            exit 0
          fi

          BRANCH="${GITHUB_REF_NAME}"
          VERSION=""
          CHANNEL=""

          if echo "${BRANCH}" | grep -Eq '^develop/[0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION="$(echo "${BRANCH}" | sed -n 's|^develop/\([0-9]\+\.[0-9]\+\.[0-9]\+\)$|\1|p')"
            CHANNEL="alpha"
            if [ -z "${VERSION}" ]; then
              echo "Branch must match develop/x.y.z. current=${BRANCH}"
              exit 1
            fi
          else
            VERSION="$(echo "${BRANCH}" | sed -n 's|^release/\([0-9]\+\.[0-9]\+\.[0-9]\+\)$|\1|p')"
            CHANNEL="rc"
            if [ -z "${VERSION}" ]; then
              echo "Branch must match release/x.y.z. current=${BRANCH}"
              exit 1
            fi
          fi

          PREFIX="${VERSION}-${CHANNEL}."
          LAST="$(git tag -l "${PREFIX}*" | sed -n "s/^${VERSION}-${CHANNEL}\.\([0-9][0-9]*\)$/\1/p" | sort -n | tail -n 1)"
          if [ -z "${LAST}" ]; then
            NEXT=1
          else
            NEXT=$((LAST + 1))
          fi

          TAG="${VERSION}-${CHANNEL}.${NEXT}"
          echo "Create tag: ${TAG}"

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
